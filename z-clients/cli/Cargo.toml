[package]
name = "diom-cli"
license.workspace = true
version.workspace = true
rust-version.workspace = true
edition = "2024"

[package.metadata.cargo-machete]
ignored = [
    # not a direct dependency, but we want to pin its version
    # see comment in root Cargo.toml
    "idna_adapter",
]

[[bin]]
name = "diom"
path = "src/main.rs"
doctest = false

[features]
default = ["http1", "http2", "rustls-tls"]

http1 = ["diom/http1"]
http2 = ["diom/http2"]
native-tls = ["diom/native-tls"]
rustls-tls = ["diom/rustls-tls"]

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
clap_complete.workspace = true
comfy-table.workspace = true
concolor-clap.workspace = true
config.workspace = true
diom.workspace = true
diom-backend.workspace = true
diom-core.workspace = true
diom-kv.workspace = true
diom-namespace.workspace = true
dirs.workspace = true
tempfile.workspace = true
test-utils.workspace = true
futures-util.workspace = true
glob = "0.3.3"
hdrhistogram = "7.5.4"
idna_adapter.workspace = true
indicatif = "0.17"
itertools.workspace = true
jiff.workspace = true
mimalloc.workspace = true
rand.workspace = true
redis = { version = "0.27", features = ["tokio-comp"] }
rustls.workspace = true
sqlx = { workspace = true }
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "time", "rt-multi-thread"] }
tracing.workspace = true
tracing-subscriber.workspace = true
v_jsonescape = { version = "0.7.8", features = ["buf-min", "bytes-buf"] }
yansi.workspace = true
