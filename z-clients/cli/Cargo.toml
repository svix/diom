[package]
name = "diom-cli"
license.workspace = true
version.workspace = true
rust-version.workspace = true
repository.workspace = true
edition = "2024"
description = "CLI for Diom"
homepage = "https://diom.com"

[package.metadata.dist]
dist = true

[package.metadata.dist.wix]
upgrade-guid = "4851F30C-9296-4304-9AD5-93A5E64CA1A8"
path-guid = "638CF75E-C776-4550-9F17-DA577552CFF7"

[package.metadata.cargo-machete]
ignored = [
    # not a direct dependency, but we want to pin its version
    # see comment in root Cargo.toml
    "idna_adapter",
]

[[bin]]
name = "diom"
path = "src/main.rs"
doctest = false

[features]
default = ["http1", "http2", "rustls-tls"]

http1 = ["diom/http1"]
http2 = ["diom/http2"]
native-tls = ["diom/native-tls"]
rustls-tls = ["diom/rustls-tls"]

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
clap_complete.workspace = true
comfy-table.workspace = true
concolor-clap.workspace = true
config.workspace = true
diom.workspace = true
dirs.workspace = true
futures-util.workspace = true
glob = "0.3.3"
hdrhistogram = "7.5.4"
idna_adapter.workspace = true
indicatif = "0.17"
itertools.workspace = true
jiff.workspace = true
mimalloc.workspace = true
rand.workspace = true
rustls.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "time", "rt-multi-thread"] }
tracing.workspace = true
tracing-subscriber.workspace = true
v_jsonescape = { version = "0.7.8", features = ["buf-min", "bytes-buf"] }
yansi.workspace = true
