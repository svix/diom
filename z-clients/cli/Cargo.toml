[package]
name = "coyote-cli"
license.workspace = true
version.workspace = true
rust-version.workspace = true
edition = "2024"

[package.metadata.cargo-machete]
ignored = [
    # not a direct dependency, but we want to pin its version
    # see comment in root Cargo.toml
    "idna_adapter",
]

[[bin]]
name = "coyote"
path = "src/main.rs"
doctest = false

[features]
default = ["http1", "http2", "rustls-tls"]

http1 = ["coyote-client/http1"]
http2 = ["coyote-client/http2"]
native-tls = ["coyote-client/native-tls"]
rustls-tls = ["coyote-client/rustls-tls"]

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
clap_complete.workspace = true
comfy-table = "7"
concolor-clap.workspace = true
config.workspace = true
coyote-client.workspace = true
dirs.workspace = true
futures-util.workspace = true
glob = "0.3.3"
hdrhistogram = "7.5.4"
idna_adapter.workspace = true
indicatif = "0.17"
itertools.workspace = true
jiff.workspace = true
mimalloc.workspace = true
rand.workspace = true
rustls.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "time", "rt-multi-thread"] }
tracing.workspace = true
tracing-subscriber.workspace = true
v_jsonescape = { version = "0.7.8", features = ["buf-min", "bytes-buf"] }
yansi.workspace = true
