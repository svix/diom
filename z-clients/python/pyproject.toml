[project]
name = "diom"
version = "0.2.2"
description = "Diom Python client library"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "Svix Inc", email = "oss@svix.com" },
]
keywords = ["diom"]
dependencies = [
    "attrs>=25.4.0,<26.0.0",
    "httpx[http2]>=0.28.1,<0.29.0",
    "msgpack>=1.1.2,<2.0.0",
    "pydantic>=2.12.5,<3.0.0",
]

[tool.pyrefly]
project-includes = [
    "**/*.py*",
]

[project.urls]
Homepage = "https://diom.svix.com"
Repository = "https://github.com/svix/diom"

[dependency-groups]
dev = [
    "pyrefly>=0.60.2",
    "pytest>=9.0.3",
    "pytest-asyncio>=0.25.0",
    "ruff>=0.15.5",
]
