apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: coyoteclusters.coyote.svix.com
spec:
  group: coyote.svix.com
  names:
    categories: []
    kind: CoyoteCluster
    plural: coyoteclusters
    shortNames:
      - cc
    singular: coyotecluster
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.nodes
          name: Nodes
          type: integer
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.readyReplicas
          name: Ready
          type: integer
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: Auto-generated derived type for CoyoteClusterSpec via `CustomResource`
          properties:
            spec:
              description: A Coyote cluster deployment.
              properties:
                apiPort:
                  default: 8080
                  description: Port for the external API. The inter-node port is this value + 10000.
                  format: uint16
                  maximum: 65535.0
                  minimum: 0.0
                  type: integer
                bootstrap:
                  description: |-
                    Bootstrap script to run on cluster startup.
                    Currently a YAML file defining namespaces to pre-create; may become a shell script in future.
                    Mounted into pods and passed to the server via COYOTE_BOOTSTRAP_CFG_PATH.
                  nullable: true
                  type: string
                cluster:
                  default:
                    secretRef: null
                    heartbeatIntervalMs: null
                    electionTimeoutMinMs: null
                    electionTimeoutMaxMs: null
                    replicationRequestTimeoutMs: null
                    snapshotAfterWrites: null
                    snapshotAfterMs: null
                    logLevel: null
                  description: Cluster/replication configuration.
                  properties:
                    electionTimeoutMaxMs:
                      description: Maximum election timeout in milliseconds.
                      format: uint64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    electionTimeoutMinMs:
                      description: Minimum election timeout in milliseconds.
                      format: uint64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    heartbeatIntervalMs:
                      description: Heartbeat interval in milliseconds.
                      format: uint64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    logLevel:
                      description: Log level (info, debug, trace). Defaults to info.
                      nullable: true
                      type: string
                    replicationRequestTimeoutMs:
                      description: Replication request timeout in milliseconds.
                      format: uint64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    secretRef:
                      description: |-
                        Reference to a Secret containing the inter-node authentication token.
                        The referenced key (default: "secret") must contain a plaintext secret string.
                      nullable: true
                      properties:
                        key:
                          default: secret
                          description: Key within the Secret containing the value.
                          type: string
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                        - name
                      type: object
                    snapshotAfterMs:
                      description: Trigger a background snapshot after this many milliseconds.
                      format: uint64
                      minimum: 0.0
                      nullable: true
                      type: integer
                    snapshotAfterWrites:
                      description: Trigger a background snapshot after this many writes.
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                  type: object
                extraEnv:
                  default: []
                  description: Additional environment variables to inject into pods.
                  items:
                    description: An environment variable to inject into pods.
                    properties:
                      name:
                        type: string
                      value:
                        nullable: true
                        type: string
                    required:
                      - name
                    type: object
                  type: array
                image:
                  description: Container image to deploy.
                  type: string
                imagePullPolicy:
                  description: Image pull policy (Always, IfNotPresent, Never).
                  nullable: true
                  type: string
                nodes:
                  default: 1
                  description: Number of Coyote nodes. Should be odd for quorum (1, 3, 5...).
                  format: int32
                  type: integer
                podAnnotations:
                  additionalProperties:
                    type: string
                  default: {}
                  description: Additional annotations to add to pods.
                  type: object
                resources:
                  default:
                    requests: null
                    limits: null
                  description: CPU and memory resource requests and limits for the coyote container.
                  properties:
                    limits:
                      additionalProperties:
                        type: string
                      description: Resource limits — the maximum resources the container may use.
                      nullable: true
                      type: object
                    requests:
                      additionalProperties:
                        type: string
                      description: Resource requests — the minimum guaranteed resources for the container.
                      nullable: true
                      type: object
                  type: object
                service:
                  default:
                    type: null
                    annotations: {}
                  description: Configuration for the externally-facing Service.
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      default: {}
                      description: Additional annotations for the Service (e.g. for cloud load balancer configuration).
                      type: object
                    type:
                      description: Service type (ClusterIP, LoadBalancer, NodePort). Defaults to ClusterIP.
                      nullable: true
                      type: string
                  type: object
                storage:
                  description: Storage configuration.
                  properties:
                    logs:
                      description: |-
                        Separate volume for Raft commit logs.
                        Recommended for high-throughput deployments to avoid I/O contention
                        with the persistent DB.
                      nullable: true
                      properties:
                        size:
                          description: Storage size in Kubernetes Quantity format, e.g. "10Gi".
                          type: string
                        storageClass:
                          description: Storage class name. Uses the cluster default if not specified.
                          nullable: true
                          type: string
                      required:
                        - size
                      type: object
                    persistent:
                      description: Persistent database storage (fjall persistent DB).
                      properties:
                        size:
                          description: Storage size in Kubernetes Quantity format, e.g. "10Gi".
                          type: string
                        storageClass:
                          description: Storage class name. Uses the cluster default if not specified.
                          nullable: true
                          type: string
                      required:
                        - size
                      type: object
                    snapshots:
                      description: |-
                        Separate volume for Raft snapshots.
                        Must be at least as large as persistent + ephemeral DB combined.
                      nullable: true
                      properties:
                        size:
                          description: Storage size in Kubernetes Quantity format, e.g. "10Gi".
                          type: string
                        storageClass:
                          description: Storage class name. Uses the cluster default if not specified.
                          nullable: true
                          type: string
                      required:
                        - size
                      type: object
                  required:
                    - persistent
                  type: object
                topologySpreadConstraints:
                  default: []
                  description: |-
                    Topology spread constraints for pod scheduling.
                    Use this to spread pods across availability zones or nodes.
                    See: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
                  items:
                    type: object
                  type: array
              required:
                - image
                - storage
              type: object
            status:
              description: Status of a CoyoteCluster.
              nullable: true
              properties:
                phase:
                  default: Initializing
                  enum:
                    - Initializing
                    - Running
                    - Degraded
                  type: string
                readyReplicas:
                  default: 0
                  format: int32
                  type: integer
              type: object
          required:
            - spec
          title: CoyoteCluster
          type: object
      served: true
      storage: true
      subresources:
        status: {}
