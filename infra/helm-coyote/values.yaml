crds:
  # Install the CoyoteCluster CRD.
  enabled: true

operator:
  image:
    repository: ghcr.io/svix/coyote-operator
    pullPolicy: IfNotPresent
    # Overrides the image tag. Defaults to the chart's appVersion.
    tag: ""

  imagePullSecrets: []

  serviceAccount:
    create: true
    # If not set, defaults to the fullname of the release.
    name: ""
    annotations: {}

  rbac:
    create: true

  logLevel: info

  podAnnotations: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

# Definition for coyote cluster
cluster:
  enabled: true
  name: coyote
  image:
    repository: ghcr.io/svix/coyote-server
    tag: ""
  spec:
    nodes: 3
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "external"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    storage:
      persistent:
        size: 64Gi
        storageClass: gp3-encrypted
    extraEnv:
      - name: COYOTE_OPENTELEMETRY_METRICS_ADDRESS
        value: "http://prometheus-kube-prometheus-prometheus.prometheus.svc.cluster.local:9090/api/v1/otlp/v1/metrics"
      - name: COYOTE_OPENTELEMETRY_METRICS_USE_HTTP
        value: "true"
      - name: RUST_LOG
        value: debug
      - name: RUST_BACKTRACE
        value: "1"
      - name: COYOTE_LOG_FORMAT
        value: "json"
      - name: COYOTE_OPENTELEMETRY_ADDRESS
        value: grpc://datadog-agent.datadog.svc.cluster.local:4317
      - name: COYOTE_ADMIN_TOKEN
        value: "admin_abcdefghijlmnopqrstuvwxyz12345"
    nodeSelector:
      db-name: coyote
    tolerations:
      - key: db-name
        operator: Equal
        value: coyote
        effect: NoSchedule
