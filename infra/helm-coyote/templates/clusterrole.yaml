{{- if .Values.operator.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "coyote-operator.fullname" . }}
  labels:
    {{- include "coyote-operator.labels" . | nindent 4 }}
rules:
  # Manage CoyoteCluster resources and their status subresource.
  - apiGroups: ["coyote.svix.com"]
    resources: ["coyoteclusters"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["coyote.svix.com"]
    resources: ["coyoteclusters/status"]
    verbs: ["get", "patch", "update"]

  # Manage owned StatefulSets.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Manage owned Services.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Manage owned PodDisruptionBudgets.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read pod status (used to determine cluster health).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Emit Kubernetes events.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
