{{- if .Values.operator.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "diom-operator.fullname" . }}
  labels:
    {{- include "diom-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["diom.svix.com"]
    resources: ["diomclusters"]
    verbs: ["get", "list", "watch", "patch", "update"]

  - apiGroups: ["diom.svix.com"]
    resources: ["diomclusters/status"]
    verbs: ["get", "patch", "update"]

  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch", "update"]

  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "diom-operator.fullname" . }}-view
  labels:
    {{- include "diom-operator.labels" . | nindent 4 }}
    {{- if .Values.operator.rbac.aggregateViewClusterRoles }}
    rbac.authorization.k8s.io/aggregate-to-view: "true"
    rbac.authorization.k8s.io/aggregate-to-cluster-reader: "true"
    {{- end }}
rules:
  - apiGroups: ["diom.svix.com"]
    resources: ["diomclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["diom.svix.com"]
    resources: ["diomclusters/status"]
    verbs: ["get"]
{{- end }}
