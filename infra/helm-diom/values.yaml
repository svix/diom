crds:
  # Install the DiomCluster CRD. If not enabled, you will
  # need to manage installing the CRD yourself.
  enabled: true
  # Run a pre-install/pre-upgrade Job that applies the CRD via
  # `kubectl apply --server-side`, enabling automatic CRD schema upgrades.
  # See charts/crds/values.yaml for full configuration options.
  upgrade:
    enabled: false
    forceConflicts: false

operator:
  image:
    repository: ghcr.io/svix/diom-operator
    pullPolicy: IfNotPresent
    # Overrides the image tag. Defaults to the chart's appVersion.
    tag: ""

  imagePullSecrets: []

  serviceAccount:
    create: true
    # If not set, defaults to the fullname of the release.
    name: ""
    annotations: {}

  rbac:
    create: true

  logLevel: info

  podAnnotations: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

# Definition for the DiomCluster resource managed by the operator.
cluster:
  enabled: true
  name: diom
  image:
    repository: ghcr.io/svix/diom-server
    # tag is required when cluster.enabled=true.
    tag: ""
  spec:
    nodes: 3
    service:
      type: ClusterIP
      # annotations: {}
    storage:
      persistent:
        size: 10Gi
        # storageClass: ""
    # extraEnv: []
    # nodeSelector: {}
    # tolerations: []
