name: Lint OpenAPI

on:
  workflow_call:

jobs:
  lint-openapi:
    name: Lint openapi.json
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run vacuum lint
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/work:ro \
            dshanley/vacuum lint \
            openapi.json \
            --pipeline-output \
            --fail-severity error \
            --ruleset .vacuum.yaml \
            --min-score 0
