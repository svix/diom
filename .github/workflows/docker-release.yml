name: Docker Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Mega Releaser
    types:
      - completed

env:
  CARGO_TERM_COLOR: always

jobs:
  docker-server:
    name: release docker - server
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive Version Numbers
        id: gen_docker_tags
        run: |
          REPO="svix/diom-server"
          GIT_TAG="$(git describe --tags --abbrev=0)"
          DOCKER_TAGS=$(echo "${GIT_TAG}" | sed -E "s#v([0-9]+)\.([0-9]+)\.([0-9]+)#${REPO}:latest,${REPO}:v\1.\2.\3,${REPO}:v\1.\2,${REPO}:v\1#")
          echo "latest_tag=${REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "docker_tags=${DOCKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated Tags: ${DOCKER_TAGS}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: false
          tags: ${{ steps.gen_docker_tags.outputs.docker_tags }}
          platforms: linux/amd64
          load: true

      - name: Scan image with Grype
        id: scan
        uses: anchore/scan-action@v6
        with:
          image: "${{ steps.gen_docker_tags.outputs.latest_tag }}"
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-file: grype.sarif

      - name: Inspect action SARIF report
        if: ${{ !cancelled() && hashFiles('grype.sarif') != '' }}
        run: cat ${{ steps.scan.outputs.sarif }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          push: true
          tags: ${{ steps.gen_docker_tags.outputs.docker_tags }}
          platforms: linux/amd64,linux/arm64

  docker-cli:
    name: release docker - cli
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive Version Numbers
        id: gen_docker_tags
        run: |
          REPO="svix/diom-cli"
          GIT_TAG="$(git describe --tags --abbrev=0)"
          DOCKER_TAGS=$(echo "${GIT_TAG}" | sed -E "s#v([0-9]+)\.([0-9]+)\.([0-9]+)#${REPO}:latest,${REPO}:v\1.\2.\3,${REPO}:v\1.\2,${REPO}:v\1#")
          echo "docker_tags=${DOCKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated Tags: ${DOCKER_TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: cli-prod
          push: true
          tags: ${{ steps.gen_docker_tags.outputs.docker_tags }}
          platforms: linux/amd64,linux/arm64
