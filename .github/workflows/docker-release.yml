name: Docker Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip pushes)
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  get-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Get version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN ==="
          echo "Would release Docker images for version: ${{ steps.version.outputs.version }}"
          echo "Would push Docker images: svix/diom-server:${{ steps.version.outputs.version }}, svix/diom-cli:${{ steps.version.outputs.version }}"

  docker-server:
    name: release docker - server
    needs: get-version
    uses: ./.github/workflows/docker-build-release.yml
    with:
      image_repo: svix/diom-server
      staging_image_repo: ghcr.io/svix/diom-server-staging
      version: ${{ needs.get-version.outputs.version }}
      target: prod
      dry_run: ${{ inputs.dry_run || false }}
      cache-scope: docker-release-server
    secrets: inherit

  docker-cli:
    name: release docker - cli
    needs: get-version
    uses: ./.github/workflows/docker-build-release.yml
    with:
      image_repo: svix/diom-cli
      staging_image_repo: ghcr.io/svix/diom-cli-staging
      version: ${{ needs.get-version.outputs.version }}
      target: cli-prod
      dry_run: ${{ inputs.dry_run || false }}
      cache-scope: docker-release-cli
    secrets: inherit
