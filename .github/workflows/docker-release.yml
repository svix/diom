name: Docker Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip pushes)
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  get-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Get version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN ==="
          echo "Would release Docker images for version: ${{ steps.version.outputs.version }}"
          echo "Would push Docker images: svix/diom-server:${{ steps.version.outputs.version }}, svix/diom-cli:${{ steps.version.outputs.version }}"

  release:
    needs: [get-version]
    runs-on: ubuntu-24.04
    environment: release
    strategy:
      matrix:
        package:
          - {label: "server", repo: svix/diom-server, target: prod}
          - {label: "cli", repo: svix/diom-cli, target: cliprod}
    steps:
      - uses: actions/checkout@v6
      - name: "build and deploy ${{ matrix.package.label }}"
        uses: ./.github/actions/docker-build-release
        with:
          image_repo: ${{ matrix.package.repo }}
          target: ${{ matrix.package.target }}
          version: ${{ needs.get-version.outputs.version }}
          dry_run: ${{ inputs.dry_run || false }}
          docker-username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker-password: ${{ secrets.DOCKERHUB_TOKEN }}
