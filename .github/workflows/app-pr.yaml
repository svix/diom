name: PR App To TF Cloud

on:
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: diom-operator
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all

      - name: Build release binary
        run: cargo build --release -p diom-operator

      - name: Generate CRD manifest
        run: cargo run -p diom-operator -- --print-crd > ./infra/crd.yaml

      - name: Upload CRD artifact
        uses: actions/upload-artifact@v4
        with:
          name: crd-manifest
          path: ./infra/crd.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/operator-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-image
          path: /tmp/operator-image.tar

  deploy-kind:
    name: Deploy to KIND Cluster
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: operator-image
          path: /tmp

      - name: Download CRD artifact
        uses: actions/download-artifact@v4
        with:
          name: crd-manifest
          path: ./infra

      - name: Create KIND cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: diom-cluster
          wait: 120s

      - name: Load operator image into KIND
        run: |
          kind load image-archive /tmp/operator-image.tar --name diom-cluster
          echo "Loaded image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Apply CRD
        run: |
          kubectl apply -f ./infra/crd.yaml
          kubectl wait --for=condition=established --timeout=60s crd --all

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy operator via Helm
        run: |
          helm install diom-operator ./infra/helm-diom-operator/ \
            --set-string image.repository=${{ env.IMAGE_NAME }} \
            --set-string image.tag=${{ env.IMAGE_TAG }} \
            --set image.pullPolicy=Never \
            --wait \
            --timeout=120s

      - name: Verify operator deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl rollout status deployment/diom-operator --timeout=120s

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp'
          echo "=== Operator logs ==="
          kubectl logs -l app.kubernetes.io/name=diom-operator --tail=100 || true
