name: Diom CI
on:
  workflow_dispatch:
  workflow_call:
# When pushing to a PR, cancel any jobs still running for the previous head commit of the PR
concurrency:
  # head_ref is only defined for pull requests, run_id is always unique and defined so if this
  # workflow was not triggered by a pull request, nothing gets cancelled.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check-fmt:
    name: Formatting & Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-sort
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      # TODO: re-enable when stuff passes cargo-clippy
      # - run: cargo clippy -- --workspace -all-features --all-targets
      - run: cargo sort --check --workspace -o package,lib,bin,features,dependencies,dev-dependencies,lints,workspace
  # TODO: re-enable cargo-machete when we're further along in dev
  # check-unused-deps:
  #   name: Check Unused Dependencies
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: taiki-e/install-action@cargo-machete
  #     - run: cargo machete
  pre-commit:
    name: Validate pre-commit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: pre-commit/action@v3.0.1
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - run: just test --run-ignored all
