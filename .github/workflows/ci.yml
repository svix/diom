name: Diom CI
on:
  workflow_dispatch:
  workflow_call:
# When pushing to a PR, cancel any jobs still running for the previous head commit of the PR
concurrency:
  # head_ref is only defined for pull requests, run_id is always unique and defined so if this
  # workflow was not triggered by a pull request, nothing gets cancelled.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check-fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt -- --check
  check-manifests:
    name: Check cargo manifests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-sort
      - uses: taiki-e/install-action@cargo-machete
      - run: cargo sort --check --workspace -o package,lib,bin,features,dependencies,dev-dependencies,lints,workspace
      - run: cargo machete
  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # Use beta toolchain for a middle ground between effective caching and the latest lints
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # only save the cache on the main branch
          # cf https://github.com/Swatinem/rust-cache/issues/95
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-features --all-targets
  prek:
    name: Validate prek
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: j178/prek-action@v1
  test:
    name: Test
    runs-on: ubuntu-24.04
    env:
      RUST_LOG: debug
      "DIOM_LOG_LEVEL": debug
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests
        id: test
        run: bash .github/test-report.sh
      - name: Find Comment
        uses: peter-evans/find-comment@v1
        if: github.ref != 'refs/heads/main'
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Test Coverage:'
      - name: Create comment
        if: github.ref != 'refs/heads/main' && steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v1
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: 'Test Coverage: ${{ steps.test.outputs.coverage_percent }}%'
      - name: Update comment
        if: github.ref != 'refs/heads/main' && steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v1
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: 'Test Coverage: ${{ steps.test.outputs.coverage_percent }}%'
      - name: Upload Test Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-report
          path: |
            ./junit.xml
            ./coverage-html
          retention-days: 7
  check-codegen:
    name: Check openapi.json and SDK freshness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Regerate openapi.json and SDKs
        run: cargo codegen
      - name: Check for uncommitted changes
        run: |
          gs=$(git status -s)
          if [[ -n "$gs" ]]; then
            echo 'there are uncommitted changes!'
            # `cargo codegen` is not meant to be executed here 😒
            # shellcheck disable=SC2016
            echo 'please rerun `cargo codegen` and commit the result'
            git status
            exit 1
          else
            echo 'all good.'
          fi
