name: Diom CI
on:
  workflow_dispatch:
  workflow_call:
# When pushing to a PR, cancel any jobs still running for the previous head commit of the PR
concurrency:
  # head_ref is only defined for pull requests, run_id is always unique and defined so if this
  # workflow was not triggered by a pull request, nothing gets cancelled.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check-fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt -- --check
  check-manifests:
    name: Check cargo manifests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-sort
      - uses: taiki-e/install-action@cargo-machete
      - run: cargo sort --check --no-format --workspace -o package,lib,bin,features,dependencies,dev-dependencies,lints,workspace
      - run: cargo machete
  clippy:
    name: Clippy
    runs-on: ubicloud-standard-4-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      # Use beta toolchain for a middle ground between effective caching and the latest lints
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: ubicloud/rust-cache@v2
        with:
          # only save the cache on the main branch
          # cf https://github.com/Swatinem/rust-cache/issues/95
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-features --all-targets -- -Dwarnings
  prek:
    name: Validate prek
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: j178/prek-action@v1
  test:
    name: Test
    runs-on: ubicloud-standard-4-ubuntu-2404
    timeout-minutes: 15
    env:
      DIOM_LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - uses: ubicloud/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests
        id: test
        run: bash .github/test-report.sh
      - name: Upload Test Report
        uses: actions/upload-artifact@v7
        id: upload-report
        if: always()
        with:
          name: test-report
          path: |
            ./junit.xml
            ./coverage-html
          retention-days: 7
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: ${{ always() && github.ref != 'refs/heads/main' }}
        with:
          report_paths: './junit.xml'
          comment: true
          check_retries: true
          job_summary: true
          detailed_summary: true
          fail_on_parse_error: true
          include_time_in_summary: true
          group_suite: true
          skip_annotations: true
          check_name: 'Diom CI JUnit'
          job_name: 'Diom CI'
      - name: Find Comment
        uses: peter-evans/find-comment@v4
        if: github.ref != 'refs/heads/main'
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Test Coverage:'
      - name: Upsert comment
        if: github.ref != 'refs/heads/main'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Test Coverage: ${{ steps.test.outputs.coverage_percent }}%

            [Artifact download](${{ steps.upload-report.outputs.artifact-url}})
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
  check-codegen:
    name: Check openapi.json, SDK, and default config freshness
    runs-on: ubicloud-standard-4-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Regerate openapi.json and SDKs
        run: cargo codegen
      - name: Regerate config.defaults.toml
        run: cargo run -- write-config config.defaults.toml
      - name: Check for uncommitted changes
        run: |
          gs=$(git status -s)
          if [[ -n "$gs" ]]; then
            echo 'there are uncommitted changes!'
            # `cargo codegen` is not meant to be executed here 😒
            # shellcheck disable=SC2016
            echo 'please rerun `cargo codegen` and commit the result'
            git status
            exit 1
          else
            echo 'all good.'
          fi
  sdk-integration:
    uses: ./.github/workflows/sdk-integration.yml
  check-crd:
    name: Check CRD JSON freshness
    runs-on: ubicloud-standard-4-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ubicloud/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Regenerate CRD JSON
        run: cargo run -p diom-operator -- --print-crd-json > infra/helm-diom/charts/crds/crds/diomclusters.json
      - name: Check for uncommitted changes
        run: |
          gs=$(git status -s)
          if [[ -n "$gs" ]]; then
            echo 'CRD JSON is out of date!'
            # shellcheck disable=SC2016
            echo 'please run `cargo run -p diom-operator -- --print-crd-json` and commit the result'
            git diff
            exit 1
          else
            echo 'all good.'
          fi
  security-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
