name: SDK Integration Tests

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  COYOTE_TOKEN: admin_abcdefghijlmnopqrstuvwxyz012345

jobs:
  build-server:
    name: Build Server Binary
    runs-on: ubicloud-standard-4-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ubicloud/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build server binary
        run: cargo build --release --package coyote-server --bin coyote-server
      - uses: actions/upload-artifact@v7
        with:
          name: coyote-server-binary
          path: target/release/coyote-server
          retention-days: 1

  test-rust:
    name: Rust SDK (${{ matrix.rust }})
    needs: build-server
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coyote-server-binary
          path: /tmp
      - name: Start Coyote server
        run: .github/scripts/start-coyote-server.sh
        env:
          COYOTE_ADMIN_TOKEN: ${{ env.COYOTE_TOKEN }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false
      - name: Run Rust SDK integration tests
        run: cargo test --package coyote-client -- --ignored
      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/coyote-server.pid)" || true

  test-python:
    name: Python SDK (${{ matrix.python-version }})
    needs: build-server
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coyote-server-binary
          path: /tmp
      - name: Start Coyote server
        run: .github/scripts/start-coyote-server.sh
        env:
          COYOTE_ADMIN_TOKEN: ${{ env.COYOTE_TOKEN }}
      - uses: astral-sh/setup-uv@v7
      - name: Run Python SDK integration tests
        working-directory: z-clients/python
        run: COYOTE_INTEGRATION=1 uv run --python ${{ matrix.python-version }} --group dev pytest tests/ -v
      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/coyote-server.pid)" || true

  test-javascript:
    name: JavaScript SDK (Node ${{ matrix.node-version }})
    needs: build-server
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coyote-server-binary
          path: /tmp
      - name: Start Coyote server
        run: .github/scripts/start-coyote-server.sh
        env:
          COYOTE_ADMIN_TOKEN: ${{ env.COYOTE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies and build
        working-directory: z-clients/javascript
        run: npm ci && npm run build && npm run bundle
      - name: Run JavaScript SDK integration tests
        working-directory: z-clients/javascript
        run: node --test tests/integration.test.mjs
      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/coyote-server.pid)" || true

  test-go:
    name: Go SDK (${{ matrix.go-version }})
    needs: build-server
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coyote-server-binary
          path: /tmp
      - name: Start Coyote server
        run: .github/scripts/start-coyote-server.sh
        env:
          COYOTE_ADMIN_TOKEN: ${{ env.COYOTE_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run Go SDK integration tests
        working-directory: z-clients/go
        run: go test -tags=integration -v -count=1 ./...
      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/coyote-server.pid)" || true

  test-java:
    name: Java SDK (${{ matrix.java-version }})
    needs: build-server
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: coyote-server-binary
          path: /tmp
      - name: Start Coyote server
        run: .github/scripts/start-coyote-server.sh
        env:
          COYOTE_ADMIN_TOKEN: ${{ env.COYOTE_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Run Java SDK integration tests
        working-directory: z-clients/java
        run: ./gradlew integrationTest
      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/coyote-server.pid)" || true
