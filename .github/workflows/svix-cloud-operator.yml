name: Deploy Operator To Svix Cloud EKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. git SHA or semver)"
        required: true
        type: string
      environment:
        description: "Target environment (svix-cloud-staging-apply or svix-cloud-dev-apply)"
        required: true
        type: string
      namespace:
        description: "K8s namespace"
        type: string
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. git SHA or semver)"
        required: true
        type: string
      environment:
        description: "Target environment"
        type: string
      namespace:
        description: "K8s namespace"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/diom-operator
  OPERATOR_DIR: infra/operator

jobs:
  deploy:
    name: Deploy to Svix Cloud EKS (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read # required to pull from ghcr.io
      id-token: write # required for OIDC auth to AWS

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in GHCR
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy operator via Helm
        run: |
          helm upgrade --install diom-operator ./${{ env.OPERATOR_DIR }}/../helm-diom \
            --force-conflicts \
            --values ./${{ env.OPERATOR_DIR }}/../svix-values.yaml \
            --set-string operator.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set-string operator.image.tag=${{ inputs.image_tag }} \
            --set-string cluster.image.tag=${{ inputs.image_tag }} \
            --set operator.image.pullPolicy=Always \
            --set operator.rbac.aggregateViewClusterRoles=true \
            --set crds.enabled=true \
            --atomic \
            --timeout=120s \
            --namespace=${{ inputs.namespace }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/diom-operator --timeout=120s -n ${{ inputs.namespace }}

      - name: Verify cluster rollout
        run: |
          EXPECTED_IMAGE="ghcr.io/svix/diom-server:${{ inputs.image_tag }}"
          IMAGE_UPDATED=false
          for _ in $(seq 1 24); do
            STS_IMAGE=$(kubectl get statefulset diom -n ${{ inputs.namespace }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
            if [ "$STS_IMAGE" = "$EXPECTED_IMAGE" ]; then
              IMAGE_UPDATED=true
              break
            fi
            sleep 5
          done
          if [ "$IMAGE_UPDATED" = "false" ]; then
            echo "Timed out"
            exit 1
          fi
          kubectl rollout status statefulset/diom --timeout=120s -n ${{ inputs.namespace }}

      - name: Run integration tests
        if: contains(inputs.environment, 'staging')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ""
        run: |
          aws lambda invoke --function-name staging-cac1_lambda-run-tests \
            --region ca-central-1 \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload '{ "build_name": "${{ inputs.image_tag }}", "repo": "webhooks", "notify_user": "${{ github.actor }}" }' \
            out --output text

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ inputs.namespace }}
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' -n ${{ inputs.namespace }}
          echo "=== Operator logs ==="
          kubectl logs -l app.kubernetes.io/name=diom-operator --tail=100 -n ${{ inputs.namespace }} || true
