name: Deploy Operator To Svix Cloud EKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. git SHA or semver)"
        required: true
        type: string
      environment:
        description: "Target environment (svix-cloud-staging-apply or svix-cloud-dev-apply)"
        required: true
        type: string
      namespace:
        description: "K8s namespace"
        type: string
      diom_admin_token:
        description: "Diom admin token"
        type: string
        default: "admin_abcdefghijlmnopqrstuvwxyz012345"
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. git SHA or semver)"
        required: true
        type: string
      environment:
        description: "Target environment"
        type: string
      namespace:
        description: "K8s namespace"
        type: string
      diom_admin_token:
        description: "Diom admin token"
        type: string
        default: "admin_abcdefghijlmnopqrstuvwxyz012345"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/diom-operator
  OPERATOR_DIR: infra/operator

jobs:
  deploy:
    name: Deploy to Svix Cloud EKS (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read # required to pull from ghcr.io
      id-token: write # required for OIDC auth to AWS

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in GHCR
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create DIOM_ADMIN_TOKEN secret if not present
        run: |
          if kubectl get secret diom-admin-token -n ${{ inputs.namespace }} > /dev/null 2>&1; then
            echo "Secret diom-admin-token is already present, skipping creation."
          else
            kubectl create secret generic diom-admin-token \
              --from-literal=DIOM_ADMIN_TOKEN=${{ inputs.diom_admin_token }} \
              --namespace=${{ inputs.namespace }}
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy operator via Helm
        run: |
          helm upgrade --install diom-operator ./${{ env.OPERATOR_DIR }}/../helm-diom \
            --force-conflicts \
            --values ./${{ env.OPERATOR_DIR }}/../svix-values.yaml \
            --set-string operator.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set-string operator.image.tag=${{ inputs.image_tag }} \
            --set-string cluster.image.tag=${{ inputs.image_tag }} \
            --set operator.image.pullPolicy=Always \
            --set crds.enabled=true \
            --atomic \
            --timeout=120s \
            --namespace=${{ inputs.namespace }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/diom-operator --timeout=120s -n ${{ inputs.namespace }}

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A -n ${{ inputs.namespace }}
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' -n ${{ inputs.namespace }}
          echo "=== Operator logs ==="
          kubectl logs -l app.kubernetes.io/name=diom-operator --tail=100 -n ${{ inputs.namespace }} || true
