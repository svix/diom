---

name: Deploy EE Peripheral to TF Cloud

# on:

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - "!terraform/*/core/**"
  workflow_dispatch:

jobs:
  run_staging_peripheral:
    uses: ./.github/workflows/staging-do.yaml
    with:
      svix_module: peripheral
      copy_helm: true
      tf_do: apply
    secrets: inherit

  deploy_customers_peripheral_aws:
    needs: [run_staging_peripheral]
    uses: ./.github/workflows/customer-do.yaml
    strategy:
      fail-fast: true
      matrix:
        client_name: ["tenovos-aws"]
    with:
      copy_helm: true
      svix_module: peripheral
      client_name: ${{matrix.client_name}}
    secrets: inherit

  deploy_customers_peripheral_az:
    needs: [run_staging_peripheral]
    uses: ./.github/workflows/customer-do.yaml
    strategy:
      fail-fast: true
      matrix:
        client_name: ["codat"]
    with:
      copy_helm: true
      svix_module: peripheral
      client_name: ${{matrix.client_name}}
    secrets: inherit
