name: Docker Build Release

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
      version:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: ./Dockerfile
      target:
        required: false
        type: string
        default: prod
      context:
        required: false
        type: string
        default: .
      dry_run:
        required: false
        type: boolean
        default: false

jobs:
  docker-build-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Derive Docker tags
        id: docker_tags
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_BARE="${VERSION#v}"
          IFS='.' read -r major minor patch <<< "$VERSION_BARE"
          REPO="${{ inputs.image_repo }}"
          TAGS="${REPO}:latest,${REPO}:v${major}.${minor}.${patch},${REPO}:v${major}.${minor},${REPO}:v${major}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (scan only)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: false
          tags: ${{ steps.docker_tags.outputs.tags }}
          platforms: linux/amd64
          load: true

      - name: Scan image with Grype
        id: scan
        uses: anchore/scan-action@v6
        with:
          image: "${{ steps.docker_tags.outputs.latest_tag }}"
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-file: grype.sarif

      - name: Inspect SARIF report
        if: ${{ !cancelled() && hashFiles('grype.sarif') != '' }}
        run: cat ${{ steps.scan.outputs.sarif }}

      - name: Build and push Docker image
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
