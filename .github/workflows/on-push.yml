name: CI on Push to Main
on:
  push:
    branches: ['main']
jobs:
  check_operator_changes:
    runs-on: ubuntu-24.04
    outputs:
      operator_changed: ${{ steps.filter.outputs.operator }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            operator:
              - 'infra/operator/**'
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    # Disabling for now because results are too inconsistent
    # on github runners. Will revisit later.
    #  benchmark:
    #    uses: ./.github/workflows/benchmark.yml
    #    secrets: inherit
  docker_publish_server:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: ci
    with:
      image_name: svix/diom-server
      target: prod
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
  docker_publish_cli:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: ci
    with:
      image_name: svix/diom-cli
      target: cli-prod
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
  docker_publish_operator:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: [ci, check_operator_changes]
    if: needs.check_operator_changes.outputs.operator_changed == 'true'
    with:
      image_name: svix/diom-operator
      target: prod
      file: ./infra/operator/Dockerfile
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
