name: CI on Push to Main

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Disabling for now because results are too inconsistent
  # on github runners. Will revisit later.
  #  benchmark:
  #    uses: ./.github/workflows/benchmark.yml
  #    secrets: inherit

  java:
    uses: ./.github/workflows/java.yml

  javascript:
    uses: ./.github/workflows/javascript.yml

  python:
    uses: ./.github/workflows/python.yml

  docker_publish_server:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: ci
    with:
      image_name: svix/coyote-server
      target: prod
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write

  docker_publish_cli:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: ci
    with:
      image_name: svix/coyote-cli
      target: cli-prod
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write

  docker_publish_operator:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    needs: ci
    with:
      image_name: svix/coyote-operator
      target: prod
      file: ./infra/operator/Dockerfile
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write

  svix-cloud-deploy:
    needs:
      - docker_publish_server
      - docker_publish_operator
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/svix-cloud-operator.yml
    with:
      image_tag: sha-${{ github.sha }}
      environment: svix-cloud-staging-apply
    secrets: inherit

  benchmark-environment:
    needs: svix-cloud-deploy
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/benchmark-env.yml
    secrets: inherit
    with:
      image_tag: sha-${{ github.sha }}
      environment: svix-cloud-staging-apply
