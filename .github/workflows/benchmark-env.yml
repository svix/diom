name: Benchmark Environment

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      environment:
        required: false
        type: string
      namespace:
        description: "K8s namespace"
        type: string

jobs:
  benchmark:
    name: Benchmark Env
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ghcr.io/svix/diom-server:${{ inputs.image_tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Run benchmark
        timeout-minutes: 10
        run: |
          POD_NAME="benchmark-${{ inputs.image_tag }}-${{ github.run_attempt }}"
          kubectl run "$POD_NAME" \
            --image=${{ env.IMAGE }} \
            --restart=Never \
            -n ${{ inputs.namespace }} \
            --env="DIOM_AUTH_TOKEN=${{ secrets.DIOM_AUTH_TOKEN }}" \
            -- diom benchmark http://diom:8080
          kubectl wait "pod/$POD_NAME" \
            -n ${{ inputs.namespace }} \
            --for=jsonpath='{.status.phase}'=Succeeded \
            --timeout=9m
          kubectl logs "$POD_NAME" \
            -n ${{ inputs.namespace }} \
            | tee /tmp/benchmark-output.txt
          kubectl delete pod "$POD_NAME" \
            -n ${{ inputs.namespace }} \
            --ignore-not-found

      - name: Post benchmark results
        if: always()
        run: |
          {
            echo '## Benchmark Results'
            echo '```'
            cat /tmp/benchmark-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
