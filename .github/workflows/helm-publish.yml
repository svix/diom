name: Helm Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      operator_image_tag:
        required: true
        type: string
      server_image_tag:
        required: true
        type: string
      is_release:
        type: boolean
        default: false

jobs:
  helm-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          yq -i '.operator.image.tag = "${{ inputs.operator_image_tag }}"' infra/helm-diom/values.yaml
          yq -i '.cluster.image.tag = "${{ inputs.server_image_tag }}"' infra/helm-diom/values.yaml

      - name: Use private chart name if not a release build
        if: ${{ !inputs.is_release }}
        run: yq -i '.name = "diom-private"' infra/helm-diom/Chart.yaml

      - name: Package and push chart
        run: |
          helm package ./infra/helm-diom --version ${{ inputs.version }}
          helm push diom-${{ inputs.version }}.tgz oci://ghcr.io/svix/charts
