[workspace]
members = ["coyote", "coyote-derive"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "1.76.1"

[workspace.dependencies]
aide = { version = "=0.16.0-alpha.2", features = ["axum", "axum-json", "axum-query", "macros"] }
anyhow = "1.0.56"
assert_matches = "1.5.0"
axum = "0.8.8"
axum-extra = { version = "0.12.5", features = ["typed-header"] }
base64 = "0.22"
bytes = "1.1.0"
chrono = { version = "0.4.26", features = ["serde"] }
clap = { version = "4.1.8", features = ["derive"] }
coyote-derive.path = "coyote-derive"
crossbeam = "0.8"
crossbeam-skiplist = "0.1.3"
ctor = "0.2.7"
dotenvy = "0.15.7"
figment = { version = "0.10", features = ["toml", "env", "test"] }
futures = "0.3"
hex = "0.4.3"
hickory-resolver = "0.25.2"
http = "1.1.0"
http-body-util = "0.1.2"
hyper = { version = "1.8.1", features = ["full"] }
# Reduce compile times for idna (we don't need the fastest possible impl of UTS 46)
# As per https://github.com/hsivonen/idna_adapter?tab=readme-ov-file#opting-to-use-unicode-rs
idna_adapter = "=1.1.0"
indexmap = "2.6.0"
itertools = "0.14"
jwt-simple = "0.12"
num_enum = "0.7.2"
opentelemetry = { version = "0.26.0", features = ["metrics"] }
opentelemetry-http = "0.26.0"
opentelemetry-otlp = { version = "0.26.0", features = ["metrics"] }
opentelemetry-semantic-conventions = "0.26.0"
opentelemetry_sdk = { version = "0.26.0", features = ["rt-tokio"] }
proc-macro2 = "1.0.78"
quote = "1.0.15"
regex = "1.5.5"
reqwest = { version = "0.12.23", default-features = false, features = ["json", "rustls-tls", "hickory-dns"] }
schemars = { version = "1.2.0", features = ["chrono04"] }
serde = { version = "1.0.184", features = ["derive", "rc"] }
serde_json = { version = "1.0.74", features = ["arbitrary_precision", "raw_value"] }
serde_path_to_error = "0.1.7"
svix-ksuid = "^0.5.1"
syn = "2.0.48"
time = { version = "0.3.9", features = [ "std" ] }
tokio = { version = "1.24.2", features = ["full"] }
tokio-util = "0.7"
tower = "0.5.1"
tower-http = { version = "0.6.1", features = ["trace", "cors", "normalize-path", "request-id"] }
tracing = "0.1.35"
tracing-opentelemetry = "0.27.0"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
url = { version = "2.2.2", features = ["serde"] }
# Forked version of 0.16 with a small fix and dependency upgrades, since we
# haven't gotten around to doing a proper upgrade yet (0.17 is a large
# rewrite with a barely-useful changelog)
validator = { git = "https://github.com/svix/validator.git", rev = "aebdc34a4ed72524902ff6d63397b9c435b0578f", features = ["derive"] }


[workspace.lints.rust]
# Can't forbid as we use at least one macro that expands to unsafe code
unsafe_code = "deny"
rust_2018_idioms = { level = "warn", priority = -1 }
trivial_numeric_casts = "warn"
unreachable_pub = "warn"

[workspace.lints.clippy]
await_holding_lock = "warn"
cloned_instead_of_copied = "warn"
dbg_macro = "warn"
enum_glob_use = "warn"
filter_map_next = "warn"
if_let_mutex = "warn"
inefficient_to_string = "warn"
macro_use_imports = "warn"
manual_let_else = "warn"
match_same_arms = "warn"
mem_forget = "warn"
mut_mut = "warn"
needless_continue = "warn"
nonstandard_macro_braces = "warn"
option_option = "warn"
redundant_clone = "warn"
ref_patterns = "warn"
rest_pat_in_fully_bound_structs = "warn"
todo = "warn"
uninlined_format_args = "warn"
unnested_or_patterns = "warn"
verbose_file_reads = "warn"
# disabled default lints
enum_variant_names = "allow"

[profile.dev]
debug = 0

[profile.dev.build-override]
# optimize host dependencies for faster rebuilds.
# slows down compilation of those dependencies, but they'll not be compiled
# nearly as often as workspace crates in local development.
opt-level = 3
strip = true
